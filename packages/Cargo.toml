[package]
name = "nova-build"
version = "0.1.0"
description = "A Nova build utility"
authors = ["nova_project"]
edition = "2024"
build = false

[[bin]]
name = "nova_build"
path = "build.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }

[build]
rustflags = ["-C", "target-cpu=native"]

[profile.dev]
opt-level = 0
debug = true
overflow-checks = true

[profile.release]
opt-level = 3
codegen-units = 1
lto = "fat"
panic = "abort"
strip = "symbols"
debug = false
overflow-checks = false
